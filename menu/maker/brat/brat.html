<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Generator - Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        @font-face {
            font-family: 'arial_narrowregular';
            src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020617; font-family: Arial, sans-serif; color: #fff; }

        #memeContainer {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 320px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background-color: #ffffff;
        }

        #textOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #000000;
            font-family: arial_narrowregular, "Arial Narrow", sans-serif;
            text-align: justify;
            text-align-last: justify;
            width: calc(100% - 30px);
            max-width: 300px;
            padding: 8px;
            height: 85%;
        }

        div#textOverlay span.textFitted {
            font-weight: 500;
            font-family: arial_narrowregular, "Arial Narrow", sans-serif;
            filter: blur(2px);
            -webkit-filter: blur(2px);
            display: inline-block;
        }

        .input-field {
            width: 100%;
            background-color: #020617;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 10px 14px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #6366f1; }

        .label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            display: block;
        }

        .btn-execute {
            width: 100%;
            background: #6366f1;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-execute:hover { background: #4f46e5; }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 18px;
        }

        .api-url-block {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #94a3b8;
            word-break: break-all;
        }

        .btn-copy {
            font-size: 11px;
            background: #6366f1;
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: #4f46e5; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            z-index: 9999;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hamburger-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 60;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            align-items: center;
            justify-content: center;
        }

        .sidebar {
            background: rgba(12, 16, 25, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.06);
            position: fixed;
            height: 100vh;
            z-index: 50;
        }

        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            transition: all 0.25s;
        }

        .sidebar .nav-link:hover {
            color: #cbd5e1;
            background: rgba(99, 102, 241, 0.08);
            transform: translateX(3px);
        }

        .sidebar .nav-link.active {
            color: #fff;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.25), rgba(168, 85, 247, 0.12));
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }

        @media (max-width: 768px) {
            .hamburger-btn { display: flex; }
            .sidebar { transform: translateX(-100%); z-index: 55; }
            .sidebar.open { transform: translateX(0); }
            main { margin-left: 0 !important; padding: 12px !important; padding-top: 60px !important; }
            #memeContainer { max-width: 280px; }
        }
    </style>
</head>
<body>

    <button class="hamburger-btn" onclick="if(window.Sidebar) Sidebar.toggle()">☰</button>

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        <div id="sidebar-overlay" onclick="if(window.Sidebar) Sidebar.close()"
             style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;"></div>

        <main class="flex-1 overflow-y-auto p-8" style="margin-left: 224px;">
            <div style="max-width: 420px; margin: 0 auto;">

                <div class="mb-5">
                    <h1 style="font-size: 20px; font-weight: 700; color: #fff;">🟢 Brat Sticker</h1>
                    <p style="font-size: 12px; color: #64748b; margin-top: 3px;">Buat stiker teks ala Brat.</p>
                </div>

                <!-- PREVIEW -->
                <div class="card mb-4" style="padding: 14px;">
                    <p class="label" style="margin-bottom: 10px;">Preview</p>
                    <div id="memeContainer">
                        <div id="textOverlay"></div>
                    </div>
                </div>

                <!-- INPUT -->
                <div class="card mb-4">
                    <div class="mb-3">
                        <label class="label">Text</label>
                        <input type="text" id="textInput" class="input-field"
                            placeholder="Ketik teks..."
                            value="brat">
                    </div>
                    <button class="btn-execute" onclick="downloadImage()">📥 Download PNG</button>
                </div>

                <!-- API URL -->
                <div class="card">
                    <p class="label">🔗 API Endpoint</p>
                    <div class="api-url-block" id="apiUrl">—</div>
                    <button class="btn-copy" onclick="copyApiUrl()">📋 Copy URL</button>
                </div>

            </div>
        </main>
    </div>

    <script src="https://libraries.wmgartistservices.com/jslibrary/jquery.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="/sidebar.js"></script>
    <script src="/menu/maker/brat/brat.js"></script>
</body>
</html>
