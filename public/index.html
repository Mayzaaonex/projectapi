<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { background: rgba(136, 204, 0, 0.1); border-left: 3px solid #88cc00; color: #88cc00; }
    </style>
</head>
<body class="bg-[#050505] text-gray-400 font-sans">

    <div class="flex h-screen">
        <aside class="w-64 border-r border-white/5 p-6 flex flex-col">
            <div class="mb-10 px-2 font-bold text-white text-lg">BratGen Dashboard</div>
            
            <nav class="space-y-1 flex-1">
                <p class="text-xs font-bold text-gray-600 uppercase px-3 mb-2">Main Menu</p>
                <a href="#" class="nav-active block py-2.5 px-3 rounded-lg transition text-sm">Dashboard Overview</a>
                
                <p class="text-xs font-bold text-gray-600 uppercase px-3 mt-8 mb-2">API Management</p>
                <a href="#" class="block py-2.5 px-3 hover:bg-white/5 rounded-lg transition text-sm">API Generator</a>
                <a href="#" class="block py-2.5 px-3 hover:bg-white/5 rounded-lg transition text-sm">API Logs</a>
                
                <p class="text-xs font-bold text-gray-600 uppercase px-3 mt-8 mb-2">System</p>
                <a href="#" class="block py-2.5 px-3 hover:bg-white/5 rounded-lg transition text-sm">Settings</a>
            </nav>

            <div class="bg-white/5 p-4 rounded-xl text-xs text-center border border-white/5">
                <p class="text-white font-semibold">Need help?</p>
                <p class="mt-1">Check our documentation</p>
            </div>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <h1 class="text-2xl font-bold text-white mb-6">Dashboard Overview</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-5 rounded-2xl">
                    <p class="text-xs uppercase tracking-wider text-gray-500">Total Requests</p>
                    <h3 class="text-2xl font-bold text-white mt-1">12,482</h3>
                </div>
                <div class="glass p-5 rounded-2xl">
                    <p class="text-xs uppercase tracking-wider text-gray-500">Avg Latency</p>
                    <h3 class="text-2xl font-bold text-white mt-1">45ms</h3>
                </div>
                <div class="glass p-5 rounded-2xl">
                    <p class="text-xs uppercase tracking-wider text-gray-500">Uptime</p>
                    <h3 class="text-2xl font-bold text-white mt-1">99.9%</h3>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
