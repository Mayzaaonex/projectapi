<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link { @apply block py-2 px-4 rounded-lg transition-all text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5; }
        .nav-active { @apply text-white bg-white/10; }
    </style>
</head>
<body class="bg-[#050505] text-gray-300 font-sans">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-60 border-r border-white/5 p-6">
            <div class="mb-10 px-4 font-bold text-white text-lg tracking-tight">API Dashboard</div>
            
            <nav class="space-y-1">
                <a href="#" class="nav-link nav-active">Dashboard</a>
                <a href="#" class="nav-link">API Management</a>
                <a href="#" class="nav-link">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-10">
            <h1 class="text-xl font-semibold text-white mb-8">Dashboard Overview</h1>
            
            <div class="grid grid-cols-2 gap-6 max-w-3xl">
                <!-- Stat Cards -->
                <div class="bg-white/5 p-6 rounded-xl border border-white/5">
                    <p class="text-xs uppercase tracking-wider text-gray-500">Status</p>
                    <h3 class="text-xl font-bold text-white mt-1">Operational</h3>
                </div>
                <div class="bg-white/5 p-6 rounded-xl border border-white/5">
                    <p class="text-xs uppercase tracking-wider text-gray-500">Uptime</p>
                    <h3 class="text-xl font-bold text-white mt-1">99.9%</h3>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
