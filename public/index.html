<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        body { 
            background-color: #050505; 
            background-image: radial-gradient(circle at 80% -20%, rgba(79, 70, 229, 0.1), transparent 50%),
                              radial-gradient(circle at 20% 120%, rgba(168, 85, 247, 0.08), transparent 50%);
        }

        .sidebar { background: rgba(13, 13, 13, 0.7); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.05); }
        
        .nav-link { 
            display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; 
            font-size: 13.5px; font-weight: 500; color: #666; transition: all 0.2s ease; 
            cursor: pointer; text-decoration: none; user-select: none;
        }
        .nav-link:hover { color: #ccc; background: rgba(255,255,255,0.03); }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.06); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }

        .stat-card { 
            background: rgba(13, 13, 13, 0.5); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; 
            padding: 24px; transition: all 0.3s ease; text-align: center;
        }
        .stat-card:hover { border-color: rgba(99, 102, 241, 0.2); background: rgba(18, 18, 18, 0.6); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e44; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .credit-bar-bg { background: rgba(255,255,255,0.05); border-radius: 99px; height: 6px; overflow: hidden; width: 100%; }
        .credit-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 1s ease-in-out; }

        .api-menu-card {
            background: rgba(13, 13, 13, 0.5); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
            padding: 20px; cursor: pointer; transition: all 0.2s;
            text-align: center;
        }
        .api-menu-card:hover { border-color: rgba(99, 102, 241, 0.3); background: rgba(18, 18, 18, 0.7); }

        /* Modal overlay */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); z-index: 100; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 28px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
        }
    </style>
</head>
<body class="text-gray-300">

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="sidebar w-56 flex flex-col py-6 px-4 shrink-0">
            <div class="px-2 mb-8 flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24">
                        <path d="M13 3L4 14h8l-1 7 9-11h-8l1-7z" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="text-sm font-semibold text-white tracking-tight">Api-Mayzaa</span>
            </div>

            <nav class="flex flex-col gap-1 flex-1">
                <div class="text-[10px] font-bold text-[#333] uppercase tracking-widest px-3 mb-2">Menu</div>
                
                <a href="#" class="nav-link active" onclick="setPage('dashboard', this)">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    Dashboard
                </a>

                <a href="#" class="nav-link" onclick="setPage('api', this)">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
                        <path d="M7 8l-4 4 4 4M17 8l4 4-4 4M14 4l-4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    API
                </a>
            </nav>

            <div class="text-[10px] text-[#333] px-2">Copyright © RianModss</div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-6 md:p-10">
            
            <!-- DASHBOARD PAGE -->
            <div id="page-dashboard" class="page w-full max-w-4xl mx-auto">
                <!-- 3 Cards Rata Atas Tengah -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-8">
                    <div class="stat-card">
                        <p class="text-[10px] uppercase tracking-widest text-gray-600 font-bold mb-3">Status Sistem</p>
                        <div class="flex items-center justify-center gap-2">
                            <div class="status-dot"></div>
                            <span class="text-sm font-semibold text-white">Operational</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <p class="text-[10px] uppercase tracking-widest text-gray-600 font-bold mb-3">Uptime</p>
                        <span id="stat-uptime" class="text-2xl font-bold text-white mono">99.98%</span>
                    </div>
                    <div class="stat-card">
                        <p class="text-[10px] uppercase tracking-widest text-gray-600 font-bold mb-3">Kredit Bulan Ini</p>
                        <span id="stat-kredit" class="text-2xl font-bold text-white mono">6.800</span>
                        <div class="credit-bar-bg mt-4 mx-auto">
                            <div id="credit-bar" class="credit-bar-fill" style="width: 68%;"></div>
                        </div>
                    </div>
                </div>

                <!-- Overview bawah -->
                <div class="text-center text-gray-600 text-sm">
                    <p><span class="text-white font-semibold"></span></p>
                </div>
            </div>

            <!-- API PAGE -->
            <div id="page-api" class="page w-full" style="display: none;">
                <div class="mb-8">
                    <h1 class="text-xl font-bold text-white">API Endpoints</h1>
                    <p class="text-sm text-gray-600 mt-1">Pilih kategori endpoint yang tersedia.</p>
                </div>

                <!-- Grid 3 Kolom -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5" id="api-grid">
                    <!-- Maker -->
                    <div class="api-menu-card" onclick="openSubApi('maker')">
                        <p class="text-2xl mb-2">⚙️</p>
                        <p class="text-white font-semibold text-sm">Maker</p>
                        <p class="text-[11px] text-gray-600 mt-1">Text, Image, Sticker</p>
                    </div>

                    <!-- Downloader -->
                    <div class="api-menu-card" onclick="openSubApi('downloader')">
                        <p class="text-2xl mb-2">⬇️</p>
                        <p class="text-white font-semibold text-sm">Downloader</p>
                        <p class="text-[11px] text-gray-600 mt-1">Tiktok, YouTube, IG</p>
                    </div>

                    <!-- Tools -->
                    <div class="api-menu-card" onclick="openSubApi('tools')">
                        <p class="text-2xl mb-2">🔧</p>
                        <p class="text-white font-semibold text-sm">Tools</p>
                        <p class="text-[11px] text-gray-600 mt-1">Stalker, Nulis, DLL</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- MODAL SUB-API -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-bold text-white" id="modal-title">Sub Menu</h2>
                <button onclick="closeModalDirect()" class="text-gray-500 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <div id="modal-content" class="space-y-3"></div>
        </div>
    </div>

    <script>
        function setPage(page, el) {
            event.preventDefault();
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById('page-' + page);
            if (target) target.style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        // Sub API data
        const subApiData = {
            maker: {
                title: 'Maker Endpoints',
                items: [
                    { name: 'Brat Generator', icon: '🟢', desc: 'Buat teks gaya Brat', endpoint: '/api/maker/brat' },
                    { name: 'Text Pro', icon: '📝', desc: 'Text styling premium', endpoint: '/api/maker/textpro' },
                    { name: 'Image Gen', icon: '🖼️', desc: 'Generate gambar AI', endpoint: '/api/maker/image' },
                    { name: 'Sticker', icon: '🌟', desc: 'Buat stiker WA', endpoint: '/api/maker/sticker' }
                ]
            },
            downloader: {
                title: 'Downloader Endpoints',
                items: [
                    { name: 'TikTok', icon: '🎵', desc: 'Download video TikTok', endpoint: '/api/downloader/tiktok' },
                    { name: 'YouTube', icon: '▶️', desc: 'Download video YT', endpoint: '/api/downloader/yt' },
                    { name: 'Instagram', icon: '📷', desc: 'Download post/reel IG', endpoint: '/api/downloader/ig' }
                ]
            },
            tools: {
                title: 'Tools Endpoints',
                items: [
                    { name: 'Stalker IG', icon: '👁️', desc: 'Stalk profil Instagram', endpoint: '/api/tools/stalkig' },
                    { name: 'Nulis', icon: '✍️', desc: 'Teks ke gambar nulis', endpoint: '/api/tools/nulis' },
                    { name: 'OCR', icon: '🔍', desc: 'Ekstrak teks gambar', endpoint: '/api/tools/ocr' }
                ]
            }
        };

        function openSubApi(key) {
            const data = subApiData[key];
            if (!data) return;
            document.getElementById('modal-title').textContent = data.title;
            const content = document.getElementById('modal-content');
            content.innerHTML = data.items.map(item => `
                <div class="bg-[#1a1a1a] border border-zinc-800 rounded-xl p-4 hover:border-indigo-500/30 transition-all cursor-pointer">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">${item.icon}</span>
                        <div class="flex-1">
                            <p class="text-white text-sm font-semibold">${item.name}</p>
                            <p class="text-[11px] text-gray-600">${item.desc}</p>
                        </div>
                        <code class="text-[10px] bg-zinc-900 px-2 py-1 rounded text-gray-500 mono">${item.endpoint}</code>
                    </div>
                </div>
            `).join('');
            document.getElementById('modal-overlay').classList.add('show');
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modal-overlay')) {
                document.getElementById('modal-overlay').classList.remove('show');
            }
        }

        function closeModalDirect() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        // Auto update stats
        setInterval(() => {
            const upEl = document.getElementById('stat-uptime');
            const krEl = document.getElementById('stat-kredit');
            const barEl = document.getElementById('credit-bar');
            if (upEl) upEl.innerText = (99.90 + Math.random() * 0.1).toFixed(2) + '%';
            if (krEl && barEl) {
                const k = Math.floor(6500 + Math.random() * 500);
                krEl.innerText = k.toLocaleString();
                barEl.style.width = (k / 100) + '%';
            }
        }, 2000);
    </script>
</body>
</html>
