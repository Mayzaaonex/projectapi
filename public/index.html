<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brat: '#88cc00' } } }
        }
    </script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-gray-200 font-sans selection:bg-brat selection:text-black">

    <div class="flex min-h-screen">
        <aside class="w-64 border-r border-white/10 p-6 flex flex-col justify-between">
            <div>
                <h1 class="text-xl font-bold text-white mb-10 flex items-center gap-2">
                    <span class="w-3 h-3 bg-brat rounded-full"></span> BratGen
                </h1>
                <nav class="space-y-2">
                    <a href="#" class="block py-2 px-3 bg-white/5 rounded-lg border border-white/10">Generator</a>
                    <a href="#" class="block py-2 px-3 hover:bg-white/5 transition rounded-lg">Analytics</a>
                    <a href="#" class="block py-2 px-3 hover:bg-white/5 transition rounded-lg">API Docs</a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-2xl font-bold">Generator Dashboard</h2>
                    <p class="text-gray-500">Bikin grafis ala Brat secara instan.</p>
                </div>
                <div class="flex items-center gap-2 text-sm">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brat opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brat"></span>
                    </span>
                    <span class="text-brat">API Operational</span>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center h-80">
                    <div id="preview" class="w-full h-40 bg-brat flex items-center justify-center text-black font-black text-5xl uppercase tracking-tighter">
                        brat
                    </div>
                </div>

                <div class="glass p-6 rounded-2xl">
                    <h3 class="mb-4 font-semibold text-white">Generator Settings</h3>
                    <input type="text" placeholder="Masukkan teks..." class="w-full bg-black/50 border border-white/10 p-3 rounded-lg mb-4 focus:border-brat outline-none transition">
                    <button class="w-full bg-brat text-black font-bold py-3 rounded-lg hover:bg-white transition">Generate Image</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
