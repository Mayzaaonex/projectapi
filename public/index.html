<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #080808; }

        .sidebar { background: #0d0d0d; border-right: 1px solid rgba(255,255,255,0.06); }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: #555; transition: all 0.15s ease; cursor: pointer; text-decoration: none; }
        .nav-link:hover { color: #ccc; background: rgba(255,255,255,0.04); }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-link svg { opacity: 0.5; transition: opacity 0.15s; flex-shrink: 0; }
        .nav-link:hover svg, .nav-link.active svg { opacity: 1; }

        .stat-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 22px 24px; transition: border-color 0.2s; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e99; animation: pulse 2.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .credit-bar-bg { background: rgba(255,255,255,0.06); border-radius: 99px; height: 5px; overflow: hidden; }
        .credit-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6366f1, #8b5cf6); transition: width 1s ease-in-out; }
    </style>
</head>
<body class="text-gray-300">

    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar w-56 flex flex-col py-6 px-4 shrink-0">
            <div class="px-2 mb-8 flex items-center gap-2">
                <div class="w-6 h-6 rounded-md bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center">
                    <svg width="12" height="12" fill="none" viewBox="0 0 24 24">
                        <path d="M13 3L4 14h8l-1 7 9-11h-8l1-7z" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="text-sm font-semibold text-white tracking-tight">Dashboard</span>
            </div>

            <nav class="flex flex-col gap-1 flex-1">
                <div class="text-[10px] font-bold text-[#333] uppercase tracking-widest px-3 mb-2">Menu</div>
                <a href="#" class="nav-link active" onclick="setPage('dashboard', this)">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-link" onclick="setPage('api', this)">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24"><path d="M7 8l-4 4 4 4M17 8l4 4-4 4M14 4l-4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    API
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <div id="page-dashboard">
                <div class="mb-8">
                    <h1 class="text-lg font-semibold text-white">Dashboard</h1>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full">
                    <div class="stat-card">
                        <p class="text-[11px] uppercase tracking-widest text-gray-600 font-semibold mb-3">Status</p>
                        <div class="flex items-center gap-2">
                            <div class="status-dot"></div>
                            <span id="stat-status" class="text-base font-semibold text-white">Operational</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <p class="text-[11px] uppercase tracking-widest text-gray-600 font-semibold mb-3">Uptime</p>
                        <span id="stat-uptime" class="text-2xl font-bold text-white mono">99.98%</span>
                    </div>

                    <div class="stat-card">
                        <p class="text-[11px] uppercase tracking-widest text-gray-600 font-semibold mb-3">Kredit Digunakan Bulan Ini</p>
                        <span id="stat-kredit" class="text-2xl font-bold text-white mono">6.800</span>
                        <div class="credit-bar-bg mt-4">
                            <div id="credit-bar" class="credit-bar-fill" style="width: 68%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function setPage(page, el) {
            event.preventDefault();
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }

        // Realtime Simulation
        setInterval(() => {
            // Randomize Uptime
            const up = (99.90 + Math.random() * 0.1).toFixed(2);
            document.getElementById('stat-uptime').innerText = up + '%';
            
            // Randomize Kredit
            const k = Math.floor(6500 + Math.random() * 500);
            document.getElementById('stat-kredit').innerText = k.toLocaleString();
            document.getElementById('credit-bar').style.width = (k / 100) + '%';
        }, 2000);
    </script>
</body>
</html>
