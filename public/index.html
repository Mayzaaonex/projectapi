<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { background: #080808; }

        .sidebar { background: #0d0d0d; border-right: 1px solid rgba(255,255,255,0.06); }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: #555; transition: all 0.15s ease; cursor: pointer; text-decoration: none; }
        .nav-link:hover { color: #ccc; background: rgba(255,255,255,0.04); }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-link svg { opacity: 0.5; transition: opacity 0.15s; flex-shrink: 0; }
        .nav-link:hover svg, .nav-link.active svg { opacity: 1; }

        .stat-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 22px 24px; transition: border-color 0.2s; }
        .stat-card:hover { border-color: rgba(255,255,255,0.1); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e99; animation: pulse 2.5s infinite; flex-shrink: 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .credit-bar-bg { background: rgba(255,255,255,0.06); border-radius: 99px; height: 5px; overflow: hidden; }
        .credit-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6366f1, #8b5cf6); width: 68%; }

        .nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: #333; text-transform: uppercase; padding: 0 14px; margin-bottom: 4px; }
    </style>
</head>
<body class="text-gray-300">

    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar w-56 flex flex-col py-6 px-4 shrink-0">
            <div class="px-2 mb-8 flex items-center gap-2">
                <div class="w-6 h-6 rounded-md bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center">
                    <svg width="12" height="12" fill="none" viewBox="0 0 24 24">
                        <path d="M13 3L4 14h8l-1 7 9-11h-8l1-7z" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="text-sm font-semibold text-white tracking-tight">API Dashboard</span>
            </div>

            <nav class="flex flex-col gap-1 flex-1">
                <div class="nav-section-label mb-2">Menu</div>
                <a href="#" class="nav-link active" onclick="setPage('dashboard', this)">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    Dashboard
                </a>
                <a href="#" class="nav-link" onclick="setPage('api', this)">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24">
                        <path d="M7 8l-4 4 4 4M17 8l4 4-4 4M14 4l-4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    API
                </a>
            </nav>

            <div class="pt-4 border-t border-white/5 px-2 flex items-center gap-3">
                <div class="w-7 h-7 rounded-full bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center text-xs font-bold text-indigo-400">U</div>
                <div>
                    <p class="text-xs font-medium text-white/80">User</p>
                    <p class="text-[10px] text-gray-600 mono">Free Plan</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <div id="page-dashboard">
                <div class="mb-8">
                    <h1 class="text-lg font-semibold text-white">Dashboard</h1>
                    <p class="text-sm text-gray-600 mt-0.5">Ringkasan status sistem kamu.</p>
                </div>

                <div class="grid grid-cols-3 gap-4 max-w-2xl">
                    <div class="stat-card">
                        <p class="text-[11px] uppercase tracking-widest text-gray-600 font-semibold mb-3">Status</p>
                        <div class="flex items-center gap-2">
                            <div class="status-dot"></div>
                            <span class="text-base font-semibold text-white">Operational</span>
                        </div>
                        <p class="text-xs text-gray-600 mt-2">Semua sistem normal</p>
                    </div>

                    <div class="stat-card">
                        <p class="text-[11px] uppercase tracking-widest text-gray-600 font-semibold mb-3">Uptime</p>
                        <span class="text-2xl font-bold text-white mono">99.9<span class="text-sm text-gray-500">%</span></span>
                        <p class="text-xs text-gray-600 mt-2">30 hari terakhir</p>
                    </div>

                    <div class="stat-card">
                        <p class="text-[11px] uppercase tracking-widest text-gray-600 font-semibold mb-3">Kredit Digunakan</p>
                        <span class="text-2xl font-bold text-white mono">6.800</span>
                        <p class="text-xs text-gray-600 mt-1 mb-2">dari 10.000 limit</p>
                        <div class="credit-bar-bg">
                            <div class="credit-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-api" style="display:none">
                <div class="mb-8">
                    <h1 class="text-lg font-semibold text-white">API</h1>
                    <p class="text-sm text-gray-600 mt-0.5">Kelola API key dan penggunaan kamu.</p>
                </div>
                <div class="stat-card max-w-2xl flex items-center justify-center py-16">
                    <p class="text-sm text-gray-600">Konten API akan ditambahkan di sini.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function setPage(page, el) {
            event.preventDefault();
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + page).style.display = 'block';
        }
    </script>
</body>
</html>
