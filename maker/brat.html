<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Generator - Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        @font-face {
            font-family: 'arial_narrowregular';
            src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020617; font-family: Arial, sans-serif; color: #fff; }

        #memeContainer {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            background-color: #ffffff;
        }

        #textOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #000000;
            font-family: arial_narrowregular, "Arial Narrow", sans-serif;
            text-align: justify;
            text-align-last: justify;
            width: calc(100% - 40px);
            max-width: 460px;
            padding: 10px;
            height: 85%;
        }

        div#textOverlay span.textFitted {
            font-weight: 500;
            font-family: arial_narrowregular, "Arial Narrow", sans-serif;
            filter: blur(2px);
            -webkit-filter: blur(2px);
            display: inline-block;
        }

        .input-field {
            width: 100%;
            background-color: #020617;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #6366f1; }

        .label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            display: block;
        }

        .btn-execute {
            width: 100%;
            background: #6366f1;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-execute:hover { background: #4f46e5; }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
        }

        .api-url-block {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #94a3b8;
            word-break: break-all;
        }

        .btn-copy {
            font-size: 12px;
            background: #6366f1;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: #4f46e5; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #22c55e;
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hamburger-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 60;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            align-items: center;
            justify-content: center;
        }

        .sidebar {
            background: rgba(12, 16, 25, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(99, 102, 241, 0.06);
            position: fixed;
            height: 100vh;
            z-index: 50;
        }

        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            color: #64748b;
            text-decoration: none;
            transition: all 0.25s;
        }

        .sidebar .nav-link:hover {
            color: #cbd5e1;
            background: rgba(99, 102, 241, 0.08);
            transform: translateX(3px);
        }

        .sidebar .nav-link.active {
            color: #fff;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.25), rgba(168, 85, 247, 0.12));
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }

        @media (max-width: 768px) {
            .hamburger-btn { display: flex; }
            .sidebar { transform: translateX(-100%); z-index: 55; }
            .sidebar.open { transform: translateX(0); }
            main { margin-left: 0 !important; padding: 16px !important; padding-top: 70px !important; }
            #memeContainer { max-width: 100%; }
        }
    </style>
</head>
<body>

    <button class="hamburger-btn" onclick="if(window.Sidebar) Sidebar.toggle()">☰</button>

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        <div id="sidebar-overlay" onclick="if(window.Sidebar) Sidebar.close()"
             style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;"></div>

        <main class="flex-1 overflow-y-auto p-8" style="margin-left: 224px;">
            <div style="max-width: 600px; margin: 0 auto;">

                <div class="mb-6">
                    <h1 style="font-size: 22px; font-weight: 700; color: #fff;">🟢 Brat Generator</h1>
                    <p style="font-size: 13px; color: #64748b; margin-top: 4px;">Buat teks gaya Brat — download termasuk efek blur.</p>
                </div>

                <!-- LIVE PREVIEW DI ATAS -->
                <div class="card mb-5" style="padding: 16px;">
                    <p class="label" style="margin-bottom: 12px;">Live Preview</p>
                    <div id="memeContainer">
                        <div id="textOverlay"></div>
                    </div>
                    <p style="text-align: center; font-size: 11px; color: #475569; margin-top: 10px; font-family: 'arial_narrowregular', Arial Narrow, sans-serif;">
                        Download = persis seperti preview + blur
                    </p>
                </div>

                <!-- INPUT + BUTTON DI BAWAH -->
                <div class="card mb-5">
                    <div class="mb-4">
                        <label class="label">Text</label>
                        <input type="text" id="textInput" class="input-field"
                            placeholder="Ketik teksmu..."
                            value="bikin brat disini">
                    </div>
                    <button class="btn-execute" onclick="downloadImage()">📥 Download PNG</button>
                </div>

                <!-- API URL -->
                <div class="card">
                    <p class="label">🔗 API Endpoint</p>
                    <div class="api-url-block" id="apiUrl">—</div>
                    <button class="btn-copy" onclick="copyApiUrl()">📋 Copy URL</button>
                </div>

            </div>
        </main>
    </div>

    <script src="https://libraries.wmgartistservices.com/jslibrary/jquery.min.js"></script>
    <script>

    <script src="/public/js/sidebar.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <script>
        if (typeof Sidebar !== 'undefined') {
            document.addEventListener('DOMContentLoaded', () => Sidebar.render('maker'));
        }
    </script>

    <script>
    const textInput   = document.getElementById('textInput');
    const textOverlay = document.getElementById('textOverlay');
    const apiUrlEl    = document.getElementById('apiUrl');
    let currentApiUrl = '';

    function updatePreview() {
        const text = textInput.value || 'brat';
        textOverlay.innerText = text;
        textFit(textOverlay, { maxFontSize: 70 });
        const span = textOverlay.querySelector('span.textFitted');
        if (span) {
            span.style.filter = 'blur(2px)';
            span.style.webkitFilter = 'blur(2px)';
        }
        currentApiUrl = `${window.location.origin}/maker/brat?text=${encodeURIComponent(text)}`;
        apiUrlEl.textContent = currentApiUrl;
        trackUsage();
    }

    textInput.addEventListener('input', updatePreview);

    async function checkAutoDownload() {
        const params = new URLSearchParams(window.location.search);
        const text = params.get('text');
        if (text) {
            textInput.value = text;
            updatePreview();
            setTimeout(() => downloadImage(), 1000);
        }
    }

    async function downloadImage() {
        const container = document.getElementById('memeContainer');
        
        try {
            const sharpCanvas = await html2canvas(container, {
                backgroundColor: '#ffffff',
                scale: 3,
                useCORS: true,
                allowTaint: true,
                logging: false
            });
            
            const blurredCanvas = document.createElement('canvas');
            blurredCanvas.width = sharpCanvas.width;
            blurredCanvas.height = sharpCanvas.height;
            const ctx = blurredCanvas.getContext('2d');
            
            ctx.filter = 'blur(4px)';
            ctx.drawImage(sharpCanvas, 0, 0);
            ctx.filter = 'none';
            
            blurredCanvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'brat.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('✅ Download selesai!');
            }, 'image/png');
            
            trackUsage();
        } catch (e) {
            showToast('❌ Gagal download!', 'error');
        }
    }

    function copyApiUrl() {
        navigator.clipboard.writeText(currentApiUrl).then(() => showToast('✅ URL disalin!'));
    }

    function showToast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        if (type === 'error') t.style.background = '#ef4444';
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
    }

    let trackTimeout;
    function trackUsage() {
        clearTimeout(trackTimeout);
        trackTimeout = setTimeout(() => {
            let stats = JSON.parse(localStorage.getItem('api_stats') || '{"total":0,"credits":0,"history":[]}');
            stats.total++;
            stats.credits++;
            stats.history.push({ time: new Date().toISOString(), type: 'brat' });
            if (stats.history.length > 100) stats.history = stats.history.slice(-100);
            localStorage.setItem('api_stats', JSON.stringify(stats));
        }, 500);
    }

    window.addEventListener('load', () => {
        updatePreview();
        checkAutoDownload();
    });
    </script>

</body>
</html>
