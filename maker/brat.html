<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat API - Api-Mayzaa</title>
    <style>
        @font-face {
            font-family: 'arial_narrowregular';
            src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'arial_narrowregular', 'Arial Narrow', Arial, sans-serif;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        #memeContainer {
            position: relative;
            width: 500px;
            height: 500px;
            background: #8ACE00;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #textOverlay {
            text-align: center;
            padding: 20px;
            width: 100%;
            color: #000;
            font-family: 'arial_narrowregular', 'Arial Narrow', sans-serif;
            font-size: 80px;
            font-weight: 500;
            filter: blur(1.5px);
            word-break: break-word;
            line-height: 0.9;
        }

        input[type="text"] {
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 18px;
            border: 1px solid #d1d1d1;
            border-radius: 16px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            height: 50px;
            outline: none;
            font-family: Arial, sans-serif;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #000;
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.8; }

        .btn-secondary {
            background: #e2e8f0;
            color: #000;
        }
        .btn-secondary:hover { background: #cbd5e1; }

        .api-url {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
            font-family: monospace;
            word-break: break-all;
            max-width: 500px;
            text-align: center;
        }

        @media (max-width: 600px) {
            #memeContainer {
                width: 350px;
                height: 350px;
            }
            #textOverlay {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>

    <div id="memeContainer">
        <div id="textOverlay">brat</div>
    </div>

    <input type="text" id="textInput" placeholder="Masukkan teks..." value="brat">

    <div class="btn-group">
        <button class="btn-primary" onclick="downloadImage()">📥 Download</button>
        <button class="btn-secondary" onclick="copyApiUrl()">📋 Copy API URL</button>
    </div>

    <div class="api-url" id="apiUrlDisplay"></div>

    <script src="/public/js/sidebar.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const textOverlay = document.getElementById('textOverlay');
        let currentBlob = null;

        // Update text realtime
        textInput.addEventListener('input', () => {
            textOverlay.textContent = textInput.value || 'brat';
        });

        // Generate & download
        async function downloadImage() {
            const text = textInput.value || 'brat';
            
            // Track usage
            trackUsage('brat');
            
            // Convert HTML to canvas
            const container = document.getElementById('memeContainer');
            const canvas = await html2canvas(container, {
                backgroundColor: '#8ACE00',
                scale: 2
            });
            
            // Download
            canvas.toBlob(blob => {
                currentBlob = blob;
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'brat.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        // Copy API URL
        function copyApiUrl() {
            const text = encodeURIComponent(textInput.value || 'brat');
            const url = `${window.location.origin}/maker/brat?text=${text}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ API URL copied!');
            });
            document.getElementById('apiUrlDisplay').textContent = url;
        }

        // Track ke localStorage
        function trackUsage(type) {
            let stats = JSON.parse(localStorage.getItem('api_stats') || '{"total":0,"credits":0,"history":[]}');
            stats.total++;
            stats.credits++;
            stats.history.push({ time: new Date().toISOString(), type: type });
            if (stats.history.length > 50) stats.history = stats.history.slice(-50);
            localStorage.setItem('api_stats', JSON.stringify(stats));
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof Sidebar !== 'undefined') Sidebar.render('maker');
            document.getElementById('apiUrlDisplay').textContent = 
                `${window.location.origin}/maker/brat?text=${encodeURIComponent(textInput.value)}`;
        });
    </script>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</body>
</html>
