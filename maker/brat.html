<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat API - Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/public/css/style.css">
    <style>
        @font-face {
            font-family: 'timesregular';
            src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-01/times-roman-01-webfont.woff') format('woff'),
                 url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-01/times-roman-01-webfont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'arial_narrowregular';
            src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        #memeContainer {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 70vh;
            background-color: #8ACE00;
        }

        #textInput {
            margin: 14px auto;
            padding: 0 1vw 0.5vw 1vw;
            font-size: 18px;
            border: 1px solid #d1d1d1;
            border-radius: 16px;
            max-width: 450px;
            width: 90%;
            display: block;
            font-family: 'timesregular', serif;
            text-align: center;
            height: 50px;
            line-height: 50px;
            outline: none;
            position: relative;
            z-index: 50;
        }

        #textOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #000000;
            font-family: 'arial_narrowregular', "Arial Narrow", sans-serif;
            font-size: 100px;
            text-align: justify;
            text-align-last: justify;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            height: 300px;
        }

        #textOverlay span.textFitted {
            font-weight: 500;
            font-family: 'arial_narrowregular', "Arial Narrow", sans-serif;
            font-size: 100px;
            filter: blur(2px);
            display: inline-block;
        }

        #screenshot-blurb {
            font-size: 14px;
            font-family: 'arial_narrowregular';
            margin: 10px 0 20px 0;
            text-transform: capitalize;
            color: #000;
        }

        .btn-copy {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'arial_narrowregular', sans-serif;
        }

        .btn-copy:hover {
            opacity: 0.8;
        }

        .api-url-text {
            font-size: 11px;
            color: #555;
            margin-top: 8px;
            font-family: monospace;
            word-break: break-all;
            max-width: 500px;
        }

        @media only screen and (max-width: 1024px) {
            #textOverlay {
                width: 350px;
                height: 350px;
                padding: 0;
                font-size: 70px !important;
            }
            #memeContainer {
                min-height: 60vh;
            }
        }
    </style>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        
        <div id="sidebar-container"></div>

        <!-- Overlay sidebar -->
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="Sidebar.close()"></div>

        <main class="flex-1 overflow-y-auto" style="margin-left: 224px; background: #fff;">
            
            <!-- Brat Container fullscreen -->
            <div id="memeContainer">
                <div id="textOverlay"></div>
            </div>

            <div style="text-align: center; padding: 10px 20px;">
                <input type="text" id="textInput" value="brat and it's completely different but also still brat">
                <div id="screenshot-blurb">Take a Screenshot to Save!</div>
                
                <button class="btn-copy" onclick="copyApiUrl()">📋 Copy API URL</button>
                <div class="api-url-text" id="apiUrlDisplay"></div>
            </div>

        </main>
    </div>

    <script src="https://libraries.wmgartistservices.com/jslibrary/jquery.min.js"></script>

    <!-- textFit.js -->
    <script>
    (function(root,factory){"use strict";if(typeof define==="function"&&define.amd){define([],factory)}else if(typeof exports==="object"){module.exports=factory()}else{root.textFit=factory()}})(typeof global==="object"?global:this,function(){"use strict";var defaultSettings={alignVert:false,alignHoriz:false,multiLine:true,detectMultiLine:true,minFontSize:8,maxFontSize:80,reProcess:true,widthOnly:false,alignVertWithFlexbox:false};return function textFit(els,options){if(!options)options={};var settings={};for(var key in defaultSettings){if(options.hasOwnProperty(key)){settings[key]=options[key]}else{settings[key]=defaultSettings[key]}}if(typeof els.toArray==="function"){els=els.toArray()}var elType=Object.prototype.toString.call(els);if(elType!=='[object Array]'&&elType!=='[object NodeList]'&&elType!=='[object HTMLCollection]'){els=[els]}for(var i=0;i<els.length;i++){processItem(els[i],settings)}};function processItem(el,settings){if(!isElement(el)||(!settings.reProcess&&el.getAttribute('textFitted'))){return false}if(!settings.reProcess){el.setAttribute('textFitted',1)}var innerSpan,originalHTML,originalWidth,originalHeight;var low,mid,high;originalHTML=el.innerHTML;originalWidth=innerWidth(el);originalHeight=innerHeight(el);if(!originalWidth||(!settings.widthOnly&&!originalHeight)){if(!settings.widthOnly)throw new Error('Set a static height and width on the target element '+el.outerHTML+' before using textFit!');else throw new Error('Set a static width on the target element '+el.outerHTML+' before using textFit!')}if(originalHTML.indexOf('textFitted')===-1){innerSpan=document.createElement('span');innerSpan.className='textFitted';innerSpan.style['display']='inline-block';innerSpan.innerHTML=originalHTML;el.innerHTML='';el.appendChild(innerSpan)}else{innerSpan=el.querySelector('span.textFitted');if(hasClass(innerSpan,'textFitAlignVert')){innerSpan.className=innerSpan.className.replace('textFitAlignVert','');innerSpan.style['height']='';el.className.replace('textFitAlignVertFlex','')}}if(settings.alignHoriz){el.style['text-align']='center';innerSpan.style['text-align']='center'}var multiLine=settings.multiLine;if(settings.detectMultiLine&&!multiLine&&innerSpan.getBoundingClientRect().height>=parseInt(window.getComputedStyle(innerSpan)['font-size'],10)*2){multiLine=true}if(!multiLine){el.style['white-space']='nowrap'}low=settings.minFontSize;high=settings.maxFontSize;var size=low;while(low<=high){mid=(high+low)>>1;innerSpan.style.fontSize=mid+'px';var innerSpanBoundingClientRect=innerSpan.getBoundingClientRect();if(innerSpanBoundingClientRect.width<=originalWidth&&(settings.widthOnly||innerSpanBoundingClientRect.height<=originalHeight)){size=mid;low=mid+1}else{high=mid-1}}if(innerSpan.style.fontSize!=size+'px')innerSpan.style.fontSize=size+'px'}function innerHeight(el){var style=window.getComputedStyle(el,null);return el.getBoundingClientRect().height-parseInt(style.getPropertyValue('padding-top'),10)-parseInt(style.getPropertyValue('padding-bottom'),10)}function innerWidth(el){var style=window.getComputedStyle(el,null);return el.getBoundingClientRect().width-parseInt(style.getPropertyValue('padding-left'),10)-parseInt(style.getPropertyValue('padding-right'),10)}function isElement(o){return(typeof HTMLElement==="object"?o instanceof HTMLElement:o&&typeof o==="object"&&o!==null&&o.nodeType===1&&typeof o.nodeName==="string")}function hasClass(element,cls){return(' '+element.className+' ').indexOf(' '+cls+' ')>-1}});
    </script>

    <script>
        const textInput = document.getElementById('textInput');
        const textOverlay = document.getElementById('textOverlay');

        textOverlay.innerText = textInput.value;
        textFit(textOverlay, { maxFontSize: 70 });

        textInput.addEventListener('input', function(){
            textOverlay.innerText = this.value;
            textFit(textOverlay, { maxFontSize: 70 });
            
            // Track usage
            trackUsage();
        });

        // Copy API URL
        function copyApiUrl() {
            const text = encodeURIComponent(textInput.value);
            const url = `${window.location.origin}/maker/brat?text=${text}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ API URL copied!');
            });
            document.getElementById('apiUrlDisplay').textContent = url;
        }

        // Track ke localStorage
        function trackUsage() {
            let stats = JSON.parse(localStorage.getItem('api_stats') || '{"total":0,"credits":0,"history":[]}');
            stats.total++;
            stats.credits++;
            stats.history.push({ time: new Date().toISOString() });
            if (stats.history.length > 50) stats.history = stats.history.slice(-50);
            localStorage.setItem('api_stats', JSON.stringify(stats));
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof Sidebar !== 'undefined') Sidebar.render('maker');
            document.getElementById('apiUrlDisplay').textContent = 
                `${window.location.origin}/maker/brat?text=${encodeURIComponent(textInput.value)}`;
        });
    </script>

    <script src="/public/js/sidebar.js"></script>
</body>
</html>
