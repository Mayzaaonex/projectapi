<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Generator - Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        @font-face {
            font-family: 'arial_narrowregular';
            src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #020617; font-family: Arial, sans-serif; color: #fff; }

        #memeContainer {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 320px;
            border-radius: 16px;
            overflow: hidden;
            background-color: #ffffff;
        }

        #textOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #000000;
            font-family: arial_narrowregular, "Arial Narrow", sans-serif;
            text-align: justify;
            text-align-last: justify;
            width: calc(100% - 60px);
            max-width: 460px;
            padding: 10px;
            height: 240px;
        }

        div#textOverlay span.textFitted {
            font-weight: 500;
            font-family: arial_narrowregular, "Arial Narrow", sans-serif;
            filter: blur(2px);
            display: inline-block;
        }

        .input-field {
            width: 100%;
            background-color: #020617;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #6366f1; }

        .label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            display: block;
        }

        .btn-execute {
            width: 100%;
            background: #6366f1;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-execute:hover { background: #4f46e5; }

        .card {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 24px;
        }

        .api-url-block {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 14px 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #94a3b8;
            word-break: break-all;
        }

        .btn-copy {
            font-size: 12px;
            background: #6366f1;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn-copy:hover { background: #4f46e5; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #22c55e;
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
        }

        /* Hamburger button */
        .hamburger-btn {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 60;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            align-items: center;
            justify-content: center;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .hamburger-btn {
                display: flex;
            }

            main {
                margin-left: 0 !important;
                padding: 16px !important;
                padding-top: 70px !important;
            }

            #memeContainer {
                height: 280px;
            }

            #textOverlay {
                height: 200px;
            }
        }

        @media (max-width: 640px) {
            main > div > div:first-of-type {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>

    <!-- Hamburger Button -->
    <button class="hamburger-btn" onclick="if(window.Sidebar) Sidebar.toggle()">☰</button>

    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        <div id="sidebar-overlay" onclick="if(window.Sidebar) Sidebar.close()"
             style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;"></div>

        <main class="flex-1 overflow-y-auto p-8" style="margin-left: 224px;">
            <div style="max-width: 860px; margin: 0 auto;">

                <div class="mb-8">
                    <h1 style="font-size: 22px; font-weight: 700; color: #fff;">🟢 Brat Generator</h1>
                    <p style="font-size: 13px; color: #64748b; margin-top: 4px;">Buat teks gaya Brat — real-time preview langsung di sini.</p>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">

                    <!-- Left: Controls -->
                    <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div class="card" style="display: flex; flex-direction: column; gap: 20px;">
                            <div>
                                <label class="label">Text</label>
                                <input type="text" id="textInput" class="input-field"
                                    placeholder="Ketik teksmu..."
                                    value="bikin brat disini">
                            </div>
                            <button class="btn-execute" onclick="downloadImage()">📥 Download PNG</button>
                        </div>

                        <div class="card">
                            <p class="label">🔗 API Endpoint</p>
                            <div class="api-url-block" id="apiUrl">—</div>
                            <button class="btn-copy" onclick="copyApiUrl()">📋 Copy URL</button>
                        </div>
                    </div>

                    <!-- Right: Live Preview -->
                    <div>
                        <div class="card" style="height: 100%; display: flex; flex-direction: column; gap: 16px;">
                            <p class="label" style="margin: 0;">Live Preview</p>
                            <div id="memeContainer">
                                <div id="textOverlay"></div>
                            </div>
                            <p style="text-align: center; font-size: 12px; color: #475569; font-family: 'arial_narrowregular', Arial Narrow, sans-serif;">
                                Screenshot to save, or use the download button
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="https://libraries.wmgartistservices.com/jslibrary/jquery.min.js"></script>

    <script>

    <script src="/public/js/sidebar.js"></script>
    <script>
        if (typeof Sidebar !== 'undefined') {
            document.addEventListener('DOMContentLoaded', () => Sidebar.render('maker'));
        }
    </script>

    <script>
    const textInput   = document.getElementById('textInput');
    const textOverlay = document.getElementById('textOverlay');
    const apiUrlEl    = document.getElementById('apiUrl');
    let currentApiUrl = '';

    function updatePreview() {
        const text = textInput.value || 'brat';
        textOverlay.innerText = text;
        textFit(textOverlay, { maxFontSize: 70 });

        const span = textOverlay.querySelector('span.textFitted');
        if (span) span.style.filter = 'blur(2px)';

        currentApiUrl = `${window.location.origin}/maker/brat?text=${encodeURIComponent(text)}`;
        apiUrlEl.textContent = currentApiUrl;
        
        // Track usage setiap ngetik (deferred biar ga spam)
        trackUsage();
    }

    textInput.addEventListener('input', updatePreview);

    function downloadImage() {
        const text = textInput.value || 'brat';
        const canvas = document.createElement('canvas');
        canvas.width = 1080;
        canvas.height = 1080;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, 1080, 1080);

        ctx.fillStyle = '#000000';
        ctx.font = '500 90px "Arial Narrow", arial_narrowregular, Arial, sans-serif';
        ctx.textBaseline = 'middle';

        const words = text.split(' ');
        const lines = [];
        let currentLine = '';
        const maxWidth = 900;

        for (let word of words) {
            const testLine = currentLine + (currentLine ? ' ' : '') + word;
            if (ctx.measureText(testLine).width > maxWidth && currentLine) {
                lines.push(currentLine);
                currentLine = word;
            } else {
                currentLine = testLine;
            }
        }
        if (currentLine) lines.push(currentLine);

        const lineHeight = 110;
        const startY = (1080 / 2) - ((lines.length - 1) * lineHeight / 2);
        lines.forEach((line, i) => ctx.fillText(line, 90, startY + (i * lineHeight)));

        const a = document.createElement('a');
        a.download = 'brat.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
        
        // Track download
        trackUsage();
    }

    function copyApiUrl() {
        navigator.clipboard.writeText(currentApiUrl).then(() => showToast('✅ URL disalin!'));
    }

    function showToast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        if (type === 'error') t.style.background = '#ef4444';
        document.body.appendChild(t);
        setTimeout(() => {
            t.style.opacity = '0';
            t.style.transition = 'opacity 0.3s';
            setTimeout(() => t.remove(), 300);
        }, 2000);
    }

    // ==================== TRACKING ====================
    let trackTimeout;
    function trackUsage() {
        clearTimeout(trackTimeout);
        trackTimeout = setTimeout(() => {
            let stats = JSON.parse(localStorage.getItem('api_stats') || '{"total":0,"credits":0,"history":[]}');
            stats.total++;
            stats.credits++;
            stats.history.push({ 
                time: new Date().toISOString(), 
                type: 'brat' 
            });
            if (stats.history.length > 100) stats.history = stats.history.slice(-100);
            localStorage.setItem('api_stats', JSON.stringify(stats));
        }, 500);
    }

    window.addEventListener('load', updatePreview);
    </script>

</body>
</html>
