<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Generator - Api-Mayzaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        
        <div id="sidebar-container"></div>

        <main class="flex-1 overflow-y-auto p-8 ml-56">
            <div class="max-w-4xl mx-auto">
                
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-2xl font-bold text-white">🟢 Brat Generator</h1>
                    <p class="text-sm text-slate-400 mt-1">Buat teks gaya Brat dengan custom warna background & text.</p>
                </div>

                <!-- Input Form -->
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-6">
                    <div class="mb-4">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Text</label>
                        <input type="text" id="textInput" required 
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition"
                            placeholder="Masukkan teks...">
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Background</label>
                            <div class="flex gap-2">
                                <input type="color" id="bgColorPicker" 
                                    class="w-12 h-12 rounded-lg cursor-pointer border-0 bg-transparent"
                                    value="#8ACE00"
                                    onchange="document.getElementById('bgColorInput').value = this.value.replace('#', '')">
                                <input type="text" id="bgColorInput"
                                    class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white mono focus:outline-none focus:border-indigo-500 transition"
                                    placeholder="8ACE00" value="8ACE00">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Text Color</label>
                            <div class="flex gap-2">
                                <input type="color" id="textColorPicker" 
                                    class="w-12 h-12 rounded-lg cursor-pointer border-0 bg-transparent"
                                    value="#000000"
                                    onchange="document.getElementById('textColorInput').value = this.value.replace('#', '')">
                                <input type="text" id="textColorInput"
                                    class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white mono focus:outline-none focus:border-indigo-500 transition"
                                    placeholder="000000" value="000000">
                            </div>
                        </div>
                    </div>

                    <button onclick="generateBrat()" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3 rounded-xl hover:opacity-90 transition active:scale-[0.98]">
                        ⚡ Execute
                    </button>
                </div>

                <!-- Result -->
                <div id="resultContainer" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-white font-semibold">✅ Hasil Generate</h3>
                        <button onclick="downloadImage()" 
                            class="text-xs bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition">
                            📥 Download
                        </button>
                    </div>
                    
                    <div class="flex justify-center mb-6">
                        <img id="resultImage" alt="Generated Brat" class="result-image">
                    </div>
                    
                    <div class="bg-slate-950 border border-slate-800 rounded-xl p-4">
                        <p class="text-xs text-slate-400 mb-2 font-bold uppercase tracking-wider">🔗 API Endpoint</p>
                        <code id="apiUrl" class="text-sm text-green-400 mono break-all code-block block"></code>
                        <button onclick="copyApiUrl()" 
                            class="mt-3 text-xs bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
                            📋 Copy URL
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="/public/js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Sidebar.render('maker');
        });

        let currentImageData = null;
        let currentApiUrl = '';

        function generateBrat() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                showToast('❌ Masukkan teks dulu!', 'error');
                return;
            }

            const bgColor = document.getElementById('bgColorInput').value || '8ACE00';
            const textColor = document.getElementById('textColorInput').value || '000000';

            // Buat canvas
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1080;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#' + bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Text
            ctx.fillStyle = '#' + textColor;
            ctx.font = 'bold 80px "Inter", "Arial Black", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Word wrap
            const upperText = text.toUpperCase();
            const words = upperText.split(' ');
            const lines = [];
            let currentLine = '';

            for (let word of words) {
                const testLine = currentLine + word + ' ';
                if (ctx.measureText(testLine).width > canvas.width - 100) {
                    lines.push(currentLine.trim());
                    currentLine = word + ' ';
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine.trim());

            // Draw
            const lineHeight = 90;
            const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);
            
            lines.forEach((line, i) => {
                ctx.fillText(line, canvas.width / 2, startY + (i * lineHeight));
            });

            // Tampilkan hasil
            currentImageData = canvas.toDataURL('image/png');
            document.getElementById('resultImage').src = currentImageData;
            
            // API URL
            const baseUrl = window.location.origin;
            currentApiUrl = `${baseUrl}/maker/brat?text=${encodeURIComponent(text)}&bgColor=${bgColor}&textColor=${textColor}`;
            document.getElementById('apiUrl').textContent = currentApiUrl;
            
            document.getElementById('resultContainer').classList.remove('hidden');
        }

        function downloadImage() {
            if (!currentImageData) return;
            const link = document.createElement('a');
            link.download = 'brat.png';
            link.href = currentImageData;
            link.click();
        }

        function copyApiUrl() {
            navigator.clipboard.writeText(currentApiUrl).then(() => {
                showToast('✅ Link API berhasil dicopy!', 'success');
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'error') {
                toast.style.background = '#ef4444';
            }
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }
    </script>
</body>
</html>
